name: quran_mushaf
description: "Pixel-perfect Quran Mushaf reader with ayah-level interactivity."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  drift: any
  drift_flutter: any
  go_router: any
  dio: any
  fl_chart: any
  path_provider: any
  path: any
  json_annotation: any
  collection: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: any
  build_runner: any
  json_serializable: any

flutter:
  uses-material-design: true
  assets:
    - assets/db/
    - assets/metadata/
    - assets/pages/qaloun_golden/
