name: quran_mushaf
description: "Pixel-perfect Quran Mushaf reader with ayah-level interactivity."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  drift: any
  drift_flutter: any
  go_router: any
  dio: any
  fl_chart: any
  path_provider: any
  path: any
  json_annotation: any
  collection: any
  shared_preferences: any
  share_plus: any
  archive: ^4.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: any
  build_runner: any
  json_serializable: any
  flutter_launcher_icons: any
  flutter_native_splash: any

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logo_adaptive_fg.png"

flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/logo.png"
  android_gravity: center
  ios_content_mode: center
  android_12:
    image: "assets/logo.png"
    icon_background_color: "#FFFFFF"
    color: "#FFFFFF"

flutter:
  uses-material-design: true
  assets:
    - assets/db/
    - assets/metadata/
    - assets/pages/qaloun_bundled/
    - assets/logo.png
